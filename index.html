<!doctype html>
<html lang="sv">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./pwa-icon.png" />
  <link rel="apple-touch-icon" href="pwa-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#09090b">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, healthy-ui=true" />
  <meta name="description"
    content="Skapa och dela planer i realtid med vänner och team. Samarbeta och slutför tillsammans." />
  <title>DoneTogether</title>
  <script type="module" crossorigin src="./assets/index-CS37gOTt.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-niTZTN0d.css">
</head>

<body>
  <div id="root"></div>
  <script>
    function renderStartupError(title, details, trace) {
      document.body.textContent = '';
      const root = document.createElement('div');
      root.style.background = '#09090b';
      root.style.color = '#fff';
      root.style.minHeight = '100vh';
      root.style.padding = '20px';
      root.style.fontFamily = 'monospace';
      root.style.fontSize = '14px';
      const heading = document.createElement('h1');
      heading.style.color = '#ef4444';
      heading.style.marginBottom = '20px';
      heading.textContent = title;
      const card = document.createElement('div');
      card.style.background = '#18181b';
      card.style.padding = '20px';
      card.style.border = '1px solid #27272a';
      card.style.borderRadius = '12px';
      card.style.overflow = 'auto';
      const detailsEl = document.createElement('div');
      detailsEl.style.color = '#f87171';
      detailsEl.style.marginBottom = '10px';
      detailsEl.textContent = details;
      card.appendChild(detailsEl);
      if (trace) {
        const traceEl = document.createElement('pre');
        traceEl.style.marginTop = '15px';
        traceEl.style.color = '#a1a1aa';
        traceEl.style.whiteSpace = 'pre-wrap';
        traceEl.textContent = trace;
        card.appendChild(traceEl);
      }
      root.appendChild(heading);
      root.appendChild(card);
      document.body.appendChild(root);
    }
    window.onerror = function (message, source, lineno, colno, error) {
      const details = `${String(message)} (${String(source)}:${String(lineno)}:${String(colno)})`;
      const trace = error && error.stack ? error.stack : 'No stack trace';
      renderStartupError('CRITICAL ERROR (Pre-React)', details, trace);
    };
    window.onunhandledrejection = function (event) {
      const reason = event && event.reason != null ? String(event.reason) : 'Unknown reason';
      renderStartupError('UNHANDLED PROMISE REJECTION', `Reason: ${reason}`);
    };
  </script>
</body>

</html>
